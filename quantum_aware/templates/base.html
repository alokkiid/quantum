<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}QuantumShield{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    :root{
      --bg0:#04080F;--bg1:#080D18;--bg2:#0C1220;--bg3:#111827;--bg4:#161D2C;
      --cyan:#38BDF8;--cyan2:#7DD3FC;--blue:#818CF8;
      --green:#10B981;--red:#EF4444;--amber:#F59E0B;
      --tp:#F1F5F9;--ts:#94A3B8;--tm:#64748B;
      --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--border3:rgba(255,255,255,0.16);
      --grad:linear-gradient(135deg,#38BDF8,#818CF8);
      --grad90:linear-gradient(90deg,#38BDF8,#818CF8);
    }
    body{background:var(--bg0);color:var(--tp);font-family:'Space Grotesk',system-ui,sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    input,select,textarea{font-family:inherit}

    .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
    .orb1{top:-200px;left:10%;width:700px;height:700px;background:radial-gradient(circle,rgba(56,189,248,0.055),transparent 65%);animation:orbD1 20s ease-in-out infinite}
    .orb2{bottom:-100px;right:5%;width:600px;height:600px;background:radial-gradient(circle,rgba(129,140,248,0.05),transparent 65%);animation:orbD2 25s ease-in-out infinite}
    @keyframes orbD1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-30px) scale(1.04)}66%{transform:translate(-30px,20px) scale(0.97)}}
    @keyframes orbD2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,40px) scale(1.06)}}

    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:.4}

    .wrap{max-width:1200px;margin:0 auto;padding:0 40px;position:relative;z-index:2}
    section{position:relative;z-index:2}

    .grad-text{background:var(--grad90);background-size:220% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 5s ease infinite}
    @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    .btn-primary{background:var(--grad);background-size:200% auto;color:#fff;font-size:14px;font-weight:600;padding:12px 26px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:background-position .4s,transform .15s,box-shadow .15s;position:relative;overflow:hidden}
    .btn-primary:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 12px 40px rgba(56,189,248,0.3)}
    .btn-primary:active{transform:scale(0.97)}
    .btn-ghost{background:rgba(255,255,255,0.07);border:1px solid var(--border2);color:var(--tp);font-size:14px;font-weight:600;padding:12px 26px;border-radius:10px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:background .2s,border-color .2s,transform .15s}
    .btn-ghost:hover{background:rgba(255,255,255,0.12);border-color:var(--border3);transform:translateY(-1px)}
    .btn-danger{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
    .btn-danger:hover{background:rgba(239,68,68,0.25)}

    .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:600;position:relative;overflow:hidden}
    .chip-cyan{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);color:var(--cyan)}
    .chip-green{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--green)}
    .chip-blue{background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.25);color:var(--blue)}
    .chip-amber{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:var(--amber)}
    .chip-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red)}

    .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-green{background:var(--green);animation:pulseG 2s ease-in-out infinite}
    .dot-amber{background:var(--amber);animation:pulseA 1.5s ease-in-out infinite}
    .dot-red{background:var(--red);animation:pulseR .8s ease-in-out infinite}
    .dot-cyan{background:var(--cyan)}
    @keyframes pulseG{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.6)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
    @keyframes pulseA{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.6)}50%{box-shadow:0 0 0 7px rgba(245,158,11,0)}}
    @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)}50%{box-shadow:0 0 0 9px rgba(239,68,68,0)}}

    .reveal{opacity:0;transform:translateY(32px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
    .reveal.is-visible{opacity:1;transform:translateY(0)}
    .reveal-stagger>*{opacity:0;transform:translateY(24px);transition:opacity .55s cubic-bezier(.16,1,.3,1),transform .55s cubic-bezier(.16,1,.3,1)}
    .reveal-stagger.is-visible>*:nth-child(1){opacity:1;transform:translateY(0);transition-delay:0ms}
    .reveal-stagger.is-visible>*:nth-child(2){opacity:1;transform:translateY(0);transition-delay:80ms}
    .reveal-stagger.is-visible>*:nth-child(3){opacity:1;transform:translateY(0);transition-delay:160ms}
    .reveal-stagger.is-visible>*:nth-child(4){opacity:1;transform:translateY(0);transition-delay:240ms}
    .reveal-stagger.is-visible>*:nth-child(5){opacity:1;transform:translateY(0);transition-delay:320ms}
    .reveal-stagger.is-visible>*:nth-child(6){opacity:1;transform:translateY(0);transition-delay:400ms}

    ::-webkit-scrollbar{width:5px;background:var(--bg1)}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    .input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--tp);transition:border-color .2s,box-shadow .2s;outline:none}
    .input::placeholder{color:var(--tm)}
    .input:focus{border-color:rgba(56,189,248,0.5);box-shadow:0 0 0 3px rgba(56,189,248,0.08)}
    .input-label{font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:block}

    .flash-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
    .flash-msg{padding:12px 22px;border-radius:10px;font-size:13px;font-weight:500;backdrop-filter:blur(12px);cursor:pointer;animation:flashIn .4s cubic-bezier(.16,1,.3,1);pointer-events:auto;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    @keyframes flashIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    .flash-error{background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.4);color:#FCA5A5}
    .flash-success{background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.4);color:#6EE7B7}
    .flash-info{background:rgba(56,189,248,0.14);border:1px solid rgba(56,189,248,0.3);color:var(--cyan2)}

    .sidebar{position:fixed;left:0;top:0;bottom:0;width:236px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50}
    .sidebar-brand{padding:18px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .logo-icon{width:34px;height:34px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:logoPulse 1.3s ease-out .9s 1}
    @keyframes logoPulse{0%{box-shadow:0 0 0 0 rgba(56,189,248,0.55)}50%{box-shadow:0 0 0 12px rgba(56,189,248,0)}100%{box-shadow:0 0 0 0 rgba(56,189,248,0)}}
    .logo-name{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .logo-name span{background:var(--grad90);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
    .nav-sep{height:1px;background:var(--border);margin:12px 8px}
    .nav-label{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;padding:8px 10px 4px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--ts);transition:all .2s;border:1px solid transparent;margin-bottom:1px}
    .nav-link svg{width:15px;height:15px;flex-shrink:0}
    .nav-link:hover{background:rgba(255,255,255,0.05);color:var(--tp)}
    .nav-link.active{background:rgba(56,189,248,0.08);border-color:rgba(56,189,248,0.2);color:var(--cyan)}
    .sidebar-foot{padding:12px;border-top:1px solid var(--border)}
    .user-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border)}
    .user-av{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .user-name{font-size:13px;font-weight:600;line-height:1.2}
    .user-role{font-size:10px;color:var(--tm);font-family:'JetBrains Mono',monospace}

    .main-wrap{margin-left:236px;min-height:100vh;display:flex;flex-direction:column}
    .topbar{position:sticky;top:0;z-index:40;background:rgba(4,8,15,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
    .page-body{flex:1;padding:24px}

    .card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:22px;transition:border-color .2s}
    .card:hover{border-color:var(--border2)}
    .card-label{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.09em;font-family:'JetBrains Mono',monospace;margin-bottom:14px}

    .tbl{width:100%;border-collapse:collapse}
    .tbl th{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.09em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .tbl td{padding:12px 14px;font-size:13px;color:var(--ts);border-bottom:1px solid rgba(255,255,255,0.04)}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tbody tr{transition:background .15s}
    .tbl tbody tr:hover td{background:rgba(255,255,255,0.02)}

    .enc-aes128{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);color:var(--cyan);padding:2px 9px;border-radius:999px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .enc-aes256{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:var(--amber);padding:2px 9px;border-radius:999px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .enc-controt{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red);padding:2px 9px;border-radius:999px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap;animation:pulseR .8s ease-in-out infinite}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-wrap">
      {% for cat, msg in messages %}
        <div class="flash-msg flash-{{ cat }}" onclick="this.remove()">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script>
    const ro = new IntersectionObserver(
      es => es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('is-visible'); ro.unobserve(e.target); } }),
      { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
    );
    document.querySelectorAll('.reveal, .reveal-stagger').forEach(el => ro.observe(el));
    // Auto-dismiss flash toasts after 4s
    document.querySelectorAll('.flash-msg').forEach(el => {
      setTimeout(() => {
        el.style.transition = 'opacity .4s, transform .4s';
        el.style.opacity = '0';
        el.style.transform = 'translateY(-8px)';
        setTimeout(() => el.remove(), 400);
      }, 4000);
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
